name: Workflow To Run Docker Containers Based on Matrix Strategy
on:
   workflow_dispatch:
   push:

concurrency: 
    group: docker_info
    cancel-in-progress: true

jobs:
    docker_build:
        strategy:
          matrix:
            os: [ubuntu-latest, ubuntu-20.04, windows-latest]
            images: [hello-world, alpine ]
        runs-on: ${{ matrix.os }}
        steps:
            - name: docker info
              run: docker info
            
            - name: create container on ${{ matrix.images }} 
              run: docker run ${{ matrix.images }}
