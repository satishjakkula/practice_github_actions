name: Context Testing
on:
  push:
    branches:
      - main
      - '!feature/*'

  pull_request: 
    types: 
      - opened
      - closed
      - reopened
      - review_requested
    branches: 
      - main
    

jobs:
  dump_contests_to_log:
     name: Dump Contexts To Log
     runs-on: ubuntu-latest
     steps:
       - name: Dump GITHUB Context
         env:
            GITHUB_CONTEXT: ${{ toJson(github) }}
         run: echo $GITHUB_CONTEXT
       - name: Dump JOB Context
         env:
             JOB_CONTEXT: ${{ toJson(job) }}
         run: echo $JOB_CONTEXT
       - name: Dump Steps Context
         env:
             STEPS_CONTEXT: ${{ toJson(steps) }}
         run: echo $STEPS_CONTEXT
       - name: Dump Runner Context
         env:
             RUNNER_CONTEXT: ${{ toJson(runner) }}
         run: echo $RUNNER_CONTEXT
       - name: Dump strategy context
         env:
          STRATEGY_CONTEXT: ${{ toJson(strategy) }}
         run: echo "$STRATEGY_CONTEXT"
       - name: Dump matrix context
         env:
           MATRIX_CONTEXT: ${{ toJson(matrix) }}
         run: echo "$MATRIX_CONTEXT"
       - name: Sectrets Context
         env: 
            SECRETS_CONTEXT: ${{ toJson(secrets)}}
         run: echo $SECRETS_CONTEXT
       - name: Variables Context
         env:
            VAR_CONTEXT: ${{ toJson(vars) }}
         run: echo "$VAR_CONTEXT"
       - name: Get token permissions
         run: |
       - name: Test token permissions
         run: |
                echo "=== Token Identity ==="
                curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                  https://api.github.com/user
            
                echo "=== Repo Access ==="
                curl -s -H "  Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                  https://api.github.com/repos/${{ github.repository }} \
                  | jq '{permissions, visibility, private}'
